<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#fafafa"/>
  <text x="12" y="22" font-family="system-ui,sans-serif" font-size="14" fill="#222">double-ray-endpositions [0 0]’[10 0] path-w 0.5</text>
  <!-- center line -->
  <line x1="40" y1="100" x2="360" y2="100" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="170" y="92" font-family="system-ui,sans-serif" font-size="11" fill="#888">center line</text>
  <!-- upper ray y=+0.26 ’ about 30px above -->
  <line x1="40" y1="70" x2="360" y2="70" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="40" cy="70" r="4" fill="#2563eb"/>
  <circle cx="360" cy="70" r="4" fill="#2563eb"/>
  <text x="46" y="62" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">start1 [0 0.26]</text>
  <text x="280" y="62" font-family="system-ui,sans-serif" font-size="11" fill="#2563eb">target1</text>
  <!-- lower ray -->
  <line x1="40" y1="130" x2="360" y2="130" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="40" cy="130" r="4" fill="#dc2626"/>
  <circle cx="360" cy="130" r="4" fill="#dc2626"/>
  <text x="46" y="148" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626">start2 [0 -0.26]</text>
  <text x="280" y="148" font-family="system-ui,sans-serif" font-size="11" fill="#dc2626">target2</text>
  <!-- width brace -->
  <line x1="200" y1="70" x2="200" y2="130" stroke="#16a34a" stroke-width="1.5"/>
  <text x="208" y="105" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a">path-w+0.02</text>
</svg>
