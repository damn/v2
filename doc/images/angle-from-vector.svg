<svg xmlns="http://www.w3.org/2000/svg" width="360" height="280" viewBox="0 0 360 280">
  <rect width="360" height="280" fill="#fafafa"/>
  <text x="12" y="22" font-family="system-ui,sans-serif" font-size="14" fill="#222">angle-from-vector (0° = up, CCW)</text>
  <circle cx="180" cy="150" r="90" fill="none" stroke="#e5e5e5" stroke-width="1"/>
  <!-- up 0 -->
  <line x1="180" y1="150" x2="180" y2="60" stroke="#2563eb" stroke-width="2.5"/>
  <text x="188" y="70" font-family="system-ui,sans-serif" font-size="12" fill="#2563eb">0° [0 1]</text>
  <!-- left 90 -->
  <line x1="180" y1="150" x2="90" y2="150" stroke="#16a34a" stroke-width="2.5"/>
  <text x="40" y="145" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">90° [-1 0]</text>
  <!-- down 180 -->
  <line x1="180" y1="150" x2="180" y2="240" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="188" y="235" font-family="system-ui,sans-serif" font-size="12" fill="#ca8a04">180° [0 -1]</text>
  <!-- right 270 -->
  <line x1="180" y1="150" x2="270" y2="150" stroke="#dc2626" stroke-width="2.5"/>
  <text x="248" y="145" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">270° [1 0]</text>
  <circle cx="180" cy="150" r="3" fill="#222"/>
</svg>
