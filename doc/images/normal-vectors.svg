<svg xmlns="http://www.w3.org/2000/svg" width="360" height="200" viewBox="0 0 360 200">
  <rect width="360" height="200" fill="#fafafa"/>
  <text x="12" y="22" font-family="system-ui,sans-serif" font-size="14" fill="#222">normal-vectors [1 0]</text>
  <line x1="180" y1="170" x2="180" y2="30" stroke="#ddd"/>
  <line x1="40" y1="110" x2="320" y2="110" stroke="#ddd"/>
  <!-- v -->
  <line x1="180" y1="110" x2="280" y2="110" stroke="#2563eb" stroke-width="3"/>
  <polygon points="280,110 268,104 268,116" fill="#2563eb"/>
