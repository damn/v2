<svg xmlns="http://www.w3.org/2000/svg" width="360" height="220" viewBox="0 0 360 220">
  <rect width="360" height="220" fill="#fafafa"/>
  <text x="12" y="22" font-family="system-ui,sans-serif" font-size="14" fill="#222">add [1 2] [3 4] ’ [4 6]</text>
  <!-- axes -->
  <line x1="40" y1="180" x2="330" y2="180" stroke="#bbb" stroke-width="1"/>
  <line x1="40" y1="180" x2="40" y2="30" stroke="#bbb" stroke-width="1"/>
  <text x="320" y="195" font-family="system-ui,sans-serif" font-size="11" fill="#888">x</text>
  <text x="20" y="40" font-family="system-ui,sans-serif" font-size="11" fill="#888">y</text>
  <!-- scale: 1 unit = 25px, origin 40,180 -->
  <!-- v1 [1 2] -->
  <line x1="40" y1="180" x2="65" y2="130" stroke="#2563eb" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="70" y="128" font-family="system-ui,sans-serif" font-size="12" fill="#2563eb">[1 2]</text>
  <!-- v2 from tip of v1: +[3 4] ’ tip at [4 6] -->
  <line x1="65" y1="130" x2="140" y2="30" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="4 3"/>
  <text x="150" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#16a34a">+[3 4]</text>
  <!-- result -->
  <line x1="40" y1="180" x2="140" y2="30" stroke="#dc2626" stroke-width="2.5"/>
  <text x="145" y="28" font-family="system-ui,sans-serif" font-size="12" fill="#dc2626">[4 6]</text>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
